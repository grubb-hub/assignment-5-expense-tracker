<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Welcome to your Expense Tracker</p>
  </div>

  <mat-grid-list cols="2" rowHeight="200px" class="dashboard-grid">
    <mat-grid-tile *ngFor="let page of pages" class="dashboard-tile">
      <mat-card class="dashboard-card">
        <mat-card-header>
          <div class="card-icon">
            <mat-icon>{{ page.icon }}</mat-icon>
          </div>
        </mat-card-header>
        <mat-card-content>
          <h2>{{ page.title }}</h2>
          <p>{{ page.description }}</p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-raised-button color="primary" [routerLink]="page.link">Go</button>
        </mat-card-actions>
      </mat-card>
    </mat-grid-tile>
  </mat-grid-list>
</div>
