<div class="expenses-container">
  <h2>Quick Log</h2>

  <!-- ================= CREATE FORM ================= -->
  <form #expenseForm="ngForm">
    <div class="form-group">
      <label for="amount">Amount:</label>
      <input
        type="number"
        id="amount"
        [ngModel]="expense().amount"
        (ngModelChange)="expense.update((e) => ({ ...e, amount: $event }))"
        name="amount"
        step="0.01"
        required
      />
    </div>

    <div class="form-group">
      <label for="description">Description:</label>
      <input
        type="text"
        id="description"
        [ngModel]="expense().description"
        (ngModelChange)="expense.update((e) => ({ ...e, description: $event }))"
        name="description"
        required
      />
    </div>

    <div class="form-group">
      <label>Category:</label>

      <mat-form-field appearance="fill" class="full-width">
        <mat-select
          [ngModel]="expense().category"
          (ngModelChange)="expense.update((e) => ({ ...e, category: $event }))"
          name="category"
          required
        >
          <mat-option *ngFor="let cat of categories" [value]="cat.value">
            <div class="option-row">
              <span class="color-dot" [style.background]="cat.color"></span>
              {{ cat.label }}
            </div>
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-group">
      <label for="date">Date:</label>
      <input
        type="date"
        id="date"
        [ngModel]="expense().date"
        (ngModelChange)="expense.update((e) => ({ ...e, date: $event }))"
        name="date"
        required
      />
    </div>

    <div class="button-group">
      <button mat-raised-button color="warn" (click)="logAsExpense()" class="btn-expense">
        Log as Expense
      </button>
      <button mat-raised-button color="accent" (click)="logAsTransaction()" class="btn-transaction">
        Log as Transaction
      </button>
    </div>
  </form>

  <!-- ================= ACTIONS ================= -->
  <div class="actions">
    <button mat-stroked-button (click)="viewTransactions()">View & Manage All</button>
    <button mat-stroked-button color="warn" (click)="logout()">Logout</button>
  </div>
</div>
