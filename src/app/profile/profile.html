<div class="profile-container">
  <h2>My Profile</h2>

  <div *ngIf="loading()">Loading...</div>

  <form *ngIf="!loading()">
    <!-- NAME -->
    <div class="form-group">
      <label>Name</label>
      <input type="text" [value]="profile().name" (input)="updateName($event.target.value)" />
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" [value]="profile().email" disabled />
    </div>

    <h3>Category Budgets</h3>

    <!-- FOOD -->
    <div class="form-group">
      <label>Food</label>
      <input
        type="number"
        [value]="profile().budgets.food"
        (input)="updateBudget('food', $event.target.value)"
      />
    </div>

    <!-- TRANSPORT -->
    <div class="form-group">
      <label>Transport</label>
      <input
        type="number"
        [value]="profile().budgets.transport"
        (input)="updateBudget('transport', $event.target.value)"
      />
    </div>

    <!-- ENTERTAINMENT -->
    <div class="form-group">
      <label>Entertainment</label>
      <input
        type="number"
        [value]="profile().budgets.entertainment"
        (input)="updateBudget('entertainment', $event.target.value)"
      />
    </div>

    <!-- UTILITIES -->
    <div class="form-group">
      <label>Utilities</label>
      <input
        type="number"
        [value]="profile().budgets.utilities"
        (input)="updateBudget('utilities', $event.target.value)"
      />
    </div>

    <!-- OTHER -->
    <div class="form-group">
      <label>Other</label>
      <input
        type="number"
        [value]="profile().budgets.other"
        (input)="updateBudget('other', $event.target.value)"
      />
    </div>

    <!-- SAVE -->
    <button type="button" (click)="saveProfile()">Save Profile</button>
  </form>

  <!-- LOGOUT -->
  <button (click)="logout()">Logout</button>
</div>
