<div class="expenses-container">
  <h2>Add Expense or Transaction</h2>

  <form #expenseForm="ngForm">
    <div class="form-group">
      <label for="amount">Amount:</label>
      <input
        type="number"
        id="amount"
        [(ngModel)]="expense.amount"
        name="amount"
        step="0.01"
        required
      />
    </div>

    <div class="form-group">
      <label for="description">Description:</label>
      <input
        type="text"
        id="description"
        [(ngModel)]="expense.description"
        name="description"
        required
      />
    </div>

    <div class="form-group">
      <label for="category">Category:</label>
      <select id="category" [(ngModel)]="expense.category" name="category" required>
        <option value="">Select Category</option>
        <option value="food">Food</option>
        <option value="transport">Transport</option>
        <option value="entertainment">Entertainment</option>
        <option value="utilities">Utilities</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date:</label>
      <input type="date" id="date" [(ngModel)]="expense.date" name="date" required />
    </div>

    <div class="button-group">
      <button mat-raised-button color="warn" (click)="logAsExpense()" class="btn-expense">
        Log as Expense
      </button>
      <button mat-raised-button color="accent" (click)="logAsTransaction()" class="btn-transaction">
        Log as Transaction
      </button>
    </div>
  </form>

  <div class="actions">
    <button mat-stroked-button (click)="viewTransactions()">View All Transactions</button>
    <button mat-stroked-button color="warn" (click)="logout()">Logout</button>
  </div>
</div>
