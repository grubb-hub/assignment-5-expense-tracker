<mat-toolbar color="primary" class="navbar">
  <span class="navbar-title">{{ title }}</span>
  <span class="navbar-spacer"></span>

  <button mat-button routerLink="/dashboard" routerLinkActive="active">
    <mat-icon>dashboard</mat-icon>
    Dashboard
  </button>

  <button mat-button routerLink="/analytics" routerLinkActive="active">
    <mat-icon>analytics</mat-icon>
    Analytics
  </button>

  <button mat-button routerLink="/transactions" routerLinkActive="active">
    <mat-icon>list</mat-icon>
    My Transactions
  </button>

  <button mat-button routerLink="/transaction" routerLinkActive="active">
    <mat-icon>trending_down</mat-icon>
    Add Transaction
  </button>

  <button mat-button routerLink="/profile" routerLinkActive="active">
    <mat-icon>person</mat-icon>
    Profile
  </button>

  <button mat-icon-button [matMenuTriggerFor]="menu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
