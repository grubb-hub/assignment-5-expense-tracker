<div class="transaction-container">
  <h2>Add Transaction</h2>

  <form (ngSubmit)="addTransaction()" #transactionForm="ngForm">
    <div class="form-group">
      <label for="amount">Amount:</label>
      <input
        type="number"
        id="amount"
        [(ngModel)]="transaction.amount"
        name="amount"
        step="0.01"
        required
      />
    </div>

    <div class="form-group">
      <label for="description">Description:</label>
      <input
        type="text"
        id="description"
        [(ngModel)]="transaction.description"
        name="description"
        required
      />
    </div>

    <div class="form-group">
      <label for="category">Category:</label>
      <select id="category" [(ngModel)]="transaction.category" name="category" required>
        <option value="">Select Category</option>
        <option value="food">Food</option>
        <option value="transport">Transport</option>
        <option value="entertainment">Entertainment</option>
        <option value="utilities">Utilities</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date:</label>
      <input type="date" id="date" [(ngModel)]="transaction.date" name="date" required />
    </div>

    <button type="submit" [disabled]="!transactionForm.form.valid">Add Transaction</button>
  </form>

  <div class="actions">
    <button class="view-btn" (click)="viewTransactions()">View All Transactions</button>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>
</div>
