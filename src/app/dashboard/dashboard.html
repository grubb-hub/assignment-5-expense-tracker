<div class="dashboard-container">
  <!-- Header -->
  <div class="dashboard-header">
    <div>
      <h1>Dashboard</h1>
      <h2></h2>
      <p>Welcome to your Expense Tracker</p>
    </div>

    <button mat-stroked-button color="primary">Logout</button>
  </div>

  <!-- Cards Grid -->
  <div class="dashboard-grid">
    <mat-card class="dashboard-card" *ngFor="let page of pages" [routerLink]="page.link">
      <mat-card-header>
        <div class="card-icon">
          <mat-icon>{{ page.icon }}</mat-icon>
        </div>
      </mat-card-header>

      <mat-card-content>
        <h2>{{ page.title }}</h2>
        <p>{{ page.description }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button color="primary">Open</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
